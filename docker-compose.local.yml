volumes:
  your_local_postgres_data: {}
  your_local_postgres_data_backups: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: your_local
    container_name: your_local
    depends_on:
      - postgres
    volumes:
      - /app/.venv
      - .:/app:z

    env_file:
      - .env

    ports:
      - '8080:8080'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: my_awesome_project_production_postgres
    container_name: my_awesome_project_local_postgres
    volumes:
      - your_local_postgres_data:/var/lib/postgresql/18/docker
      - your_local_postgres_data_backups:/backups
    env_file:
      - .env

#    ports:
#      - '5433:5432'
